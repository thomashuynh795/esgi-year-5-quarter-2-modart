services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: modart
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: .
    depends_on:
      - db
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGDATABASE: modart
      PGUSER: postgres
      PGPASSWORD: postgres
      PORT: "8081"
      JWT_SECRET: "aurelien"
    ports:
      - "8081:8081"

volumes:
  pgdata:
